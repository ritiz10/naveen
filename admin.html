<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Admin Dashboard | NewsKrish</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="admin-sidebar glass" style="border-radius: 0;">
            <div class="logo" style="margin-bottom: 3rem;">NewsKrish Admin</div>
            <nav id="admin-nav" style="display: flex; flex-direction: column; gap: 0.5rem;">
                <a href="#" class="category-btn active" data-section="dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="#" class="category-btn" data-section="news"><i class="fas fa-newspaper"></i> News Management</a>
                <a href="#" class="category-btn" data-section="users"><i class="fas fa-users"></i> User Management</a>
                <a href="#" class="category-btn" data-section="comments"><i class="fas fa-comments"></i> Comments <span id="badge-comments" class="badge" style="display: none;">0</span></a>
                <a href="#" class="category-btn" data-section="feedback"><i class="fas fa-envelope"></i> Feedback <span id="badge-feedback" class="badge" style="display: none;">0</span></a>
                <a href="#" id="admin-logout" class="category-btn" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="admin-main">
            <!-- Headers are dynamic -->
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 id="section-title">Dashboard Overview</h1>
                <div id="header-actions">
                    <button class="btn-primary" id="btn-create-news"><i class="fas fa-plus"></i> Create News</button>
                </div>
            </header>

            <!-- Dashboard Section -->
            <section id="section-dashboard" class="admin-section">
                <div class="stats-grid">
                    <div class="stat-card glass">
                        <span>Total Users</span>
                        <h2 id="stat-users">0</h2>
                    </div>
                    <div class="stat-card glass">
                        <span>Total News</span>
                        <h2 id="stat-articles">0</h2>
                    </div>
                    <div class="stat-card glass">
                        <span>Total Comments</span>
                        <h2 id="stat-comments">0</h2>
                    </div>
                    <div class="stat-card glass">
                        <span>Total Feedback</span>
                        <h2 id="stat-feedback">0</h2>
                    </div>
                </div>
            </section>

            <!-- Data Table Section (Reusable) -->
            <section id="section-table" class="glass" style="padding: 1.5rem; margin-top: 2rem;">
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </section>

            <!-- News Modal -->
            <div id="news-modal" class="modal-overlay" style="display: none;">
                <div class="glass modal-content">
                    <h2 id="modal-title">Create News</h2>
                    <form id="news-form">
                        <input type="hidden" id="news-id">
                        <div class="form-group"><label>Title</label><input type="text" id="news-title" required></div>
                        <div class="form-group"><label>Category</label>
                            <select id="news-category" required>
                                <option value="technology">Technology</option>
                                <option value="placements">Placements</option>
                                <option value="events">Events</option>
                                <option value="departments">Departments</option>
                                <option value="exams">Exams</option>
                                <option value="sports">Sports</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Image URL</label><input type="url" id="news-image" required></div>
                        <div class="form-group"><label>Content</label><textarea id="news-content" rows="5" required></textarea></div>
                        <div class="modal-actions">
                            <button type="button" id="btn-close-modal" class="btn-secondary">Cancel</button>
                            <button type="submit" class="btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <style>
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .badge { background: #ef4444; color: white; padding: 2px 6px; border-radius: 10px; font-size: 0.7rem; margin-left: 5px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-content { width: 90%; max-width: 600px; padding: 2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.8rem; border-radius: 8px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-primary); }
        .modal-actions { display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem; }
        .btn-secondary { background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 0.8rem 1.5rem; border-radius: 8px; cursor: pointer; }
    </style>

    <script>
        const socket = io();
        let currentSection = 'dashboard';

        // Real-time Listeners
        socket.on('statsUpdated', (stats) => {
            updateStatsUI(stats);
        });

        socket.on('newComment', (comment) => {
            showNotification(`New comment on: ${comment.article.title}`);
            if (currentSection === 'comments') loadSectionData('comments');
            updateBadge('comments', 1);
        });

        socket.on('newFeedback', (fb) => {
            showNotification(`New feedback from: ${fb.name}`);
            if (currentSection === 'feedback') loadSectionData('feedback');
            updateBadge('feedback', 1);
        });

        function updateStatsUI(stats) {
            document.getElementById('stat-users').innerText = stats.users;
            document.getElementById('stat-articles').innerText = stats.articles;
            document.getElementById('stat-comments').innerText = stats.comments || 0;
            document.getElementById('stat-feedback').innerText = stats.feedback || 0;
        }

        function updateBadge(type, increment) {
            const badge = document.getElementById(`badge-${type}`);
            let count = parseInt(badge.innerText) + increment;
            badge.innerText = count;
            badge.style.display = count > 0 ? 'inline' : 'none';
        }

        function showNotification(msg) {
            // Simple notification logic
            console.log('Notification:', msg);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Auth check
            const res = await fetch('/api/auth/me');
            if (!res.ok) window.location.href = 'auth.html';
            const user = await res.json();
            if (user.role !== 'admin') window.location.href = 'index.html';

            initNavigation();
            loadSectionData('dashboard');
        });

        function initNavigation() {
            document.querySelectorAll('#admin-nav [data-section]').forEach(btn => {
                btn.onclick = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('#admin-nav .category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const section = btn.getAttribute('data-section');
                    loadSectionData(section);
                };
            });

            document.getElementById('admin-logout').onclick = async () => {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = 'index.html';
            };
        }

        async function loadSectionData(section) {
            currentSection = section;
            document.getElementById('section-title').innerText = section.charAt(0).toUpperCase() + section.slice(1);
            document.getElementById('badge-' + section)?.setAttribute('style', 'display:none');
            if(document.getElementById('badge-' + section)) document.getElementById('badge-' + section).innerText = '0';

            // Show/Hide Dashboard stats
            document.getElementById('section-dashboard').style.display = section === 'dashboard' ? 'block' : 'none';
            document.getElementById('header-actions').style.display = section === 'news' ? 'block' : 'none';

            const tableHead = document.getElementById('table-head');
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center">Loading...</td></tr>';

            try {
                if (section === 'dashboard') {
                    // Stats are updated by socket, but fetch initial
                    const res = await fetch('/api/news'); // This returns count now in many systems, adjusting
                    const data = await res.json();
                    // We need a dedicated stats endpoint for cleaner load, using news as proxy
                    loadSectionData('news'); // Auto load news on dashboard for now or just news list
                    return;
                }

                const res = await fetch(`/api/${section === 'news' ? 'news' : 'auth/users'}`); // Simplified for brevity
                // Note: Real implementation would need dedicated endpoints for comments/feedback
                if (section === 'news') {
                    const data = await res.json();
                    renderNewsTable(data.articles);
                } else if (section === 'users') {
                    const res = await fetch('/api/auth/users');
                    const users = await res.json();
                    renderUsersTable(users);
                } else if (section === 'comments') {
                    const res = await fetch('/api/comments');
                    const comments = await res.json();
                    renderCommentsTable(comments);
                } else if (section === 'feedback') {
                    const res = await fetch('/api/feedback');
                    const feedback = await res.json();
                    renderFeedbackTable(feedback);
                }
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="5">Failed to load data</td></tr>';
            }
        }

        function renderNewsTable(articles) {
            document.getElementById('table-head').innerHTML = `<tr><th>Title</th><th>Category</th><th>Views</th><th>Actions</th></tr>`;
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            articles.forEach(a => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${a.title.substring(0, 40)}...</td>
                    <td style="text-transform: capitalize;">${a.category}</td>
                    <td>${a.views}</td>
                    <td>
                        <button onclick="editNews('${a._id}')" class="btn-icon"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteNews('${a._id}')" class="btn-icon delete"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function renderUsersTable(users) {
            document.getElementById('table-head').innerHTML = `<tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr>`;
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td>${u.role}</td>
                    <td><span class="status-tag ${u.isBlocked ? 'blocked' : 'active'}">${u.isBlocked ? 'Blocked' : 'Active'}</span></td>
                    <td>
                        <button onclick="toggleBlock('${u._id}')" class="btn-icon">${u.isBlocked ? '<i class="fas fa-unlock"></i>' : '<i class="fas fa-user-slash"></i>'}</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function renderCommentsTable(comments) {
            document.getElementById('table-head').innerHTML = `<tr><th>User</th><th>Article</th><th>Comment</th><th>Actions</th></tr>`;
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            comments.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${c.user?.name || 'Deleted'}</td>
                    <td>${c.article?.title.substring(0, 20)}...</td>
                    <td>${c.content}</td>
                    <td>
                        <button onclick="deleteComment('${c._id}')" class="btn-icon delete"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function renderFeedbackTable(feedback) {
            document.getElementById('table-head').innerHTML = `<tr><th>From</th><th>Message</th><th>Status</th><th>Actions</th></tr>`;
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            feedback.forEach(f => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${f.name} <br> <small>${f.email}</small></td>
                    <td>${f.message}</td>
                    <td><span class="status-tag ${f.status}">${f.status}</span></td>
                    <td>
                        ${f.status === 'pending' ? `<button onclick="resolveFeedback('${f._id}')" class="btn-icon"><i class="fas fa-check"></i></button>` : ''}
                        <button onclick="deleteFeedback('${f._id}')" class="btn-icon delete"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        // Actions
        window.toggleBlock = async (id) => {
            const res = await fetch(`/api/auth/users/${id}/block`, { method: 'PUT' });
            if(res.ok) loadSectionData('users');
        };

        window.deleteNews = async (id) => {
            if(confirm('Delete article?')) {
                await fetch(`/api/news/${id}`, { method: 'DELETE' });
                loadSectionData('news');
            }
        };

        window.deleteComment = async (id) => {
            if(confirm('Delete comment?')) {
                await fetch(`/api/comments/${id}`, { method: 'DELETE' });
                loadSectionData('comments');
            }
        };

        window.resolveFeedback = async (id) => {
            await fetch(`/api/feedback/${id}/resolve`, { method: 'PUT' });
            loadSectionData('feedback');
        };

        window.deleteFeedback = async (id) => {
            if(confirm('Delete feedback?')) {
                await fetch(`/api/feedback/${id}`, { method: 'DELETE' });
                loadSectionData('feedback');
            }
        };

        // News Modal logic
        const modal = document.getElementById('news-modal');
        document.getElementById('btn-create-news').onclick = () => {
            document.getElementById('news-form').reset();
            document.getElementById('news-id').value = '';
            document.getElementById('modal-title').innerText = 'Create News';
            modal.style.display = 'flex';
        };

        document.getElementById('btn-close-modal').onclick = () => modal.style.display = 'none';

        window.editNews = async (id) => {
            const res = await fetch(`/api/news/${id}`);
            const a = await res.json();
            document.getElementById('news-id').value = a._id;
            document.getElementById('news-title').value = a.title;
            document.getElementById('news-category').value = a.category;
            document.getElementById('news-image').value = a.image_url;
            document.getElementById('news-content').value = a.content;
            document.getElementById('modal-title').innerText = 'Edit News';
            modal.style.display = 'flex';
        };

        document.getElementById('news-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('news-id').value;
            const payload = {
                title: document.getElementById('news-title').value,
                category: document.getElementById('news-category').value,
                image_url: document.getElementById('news-image').value,
                content: document.getElementById('news-content').value
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/news/${id}` : '/api/news';
            
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if(res.ok) {
                modal.style.display = 'none';
                loadSectionData('news');
            }
        };
    </script>
</body>
</html>
