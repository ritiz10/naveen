<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | NewsKrish</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">NewsKrish</a>
            <nav class="nav-links">
                <!-- Dynamically Populated by nav.js -->
            </nav>
        </div>
    </header>

    <main class="container" style="margin-top: 120px; min-height: 80vh;">
        <div class="hero-content" style="margin-bottom: 3rem;">
            <h1 class="hero-title" style="font-size: 3rem;">My Profile</h1>
            <p style="color: var(--text-muted);">Manage your personal information and student details.</p>
        </div>

        <div id="loader" style="color: var(--primary); font-size: 1.2rem;">Loading profile...</div>

        <div id="profile-card" class="glass" style="max-width: 600px; padding: 3rem; display: none;">
            
            <div style="display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 2rem;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(45deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; color: white;" id="avatar-initial">X</div>
                <div>
                    <h2 id="prof-name" style="font-size: 2rem;">Loading...</h2>
                    <span id="prof-role" style="color: var(--primary); font-weight: 500; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Role</span>
                </div>
            </div>

            <div style="display: grid; gap: 1.5rem;">
                <div>
                    <span style="display: block; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 0.3rem;">Email Address</span>
                    <strong id="prof-email" style="font-size: 1.1rem;">...</strong>
                </div>
                <div>
                    <span style="display: block; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 0.3rem;">Profile ID / Roll No</span>
                    <strong id="prof-id" style="font-size: 1.1rem;">...</strong>
                </div>
                <div>
                    <span style="display: block; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 0.3rem;">Department</span>
                    <strong id="prof-dept" style="font-size: 1.1rem;">...</strong>
                </div>
            </div>

        </div>
    </main>

    <script src="nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/auth/me');
                
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('profile-card').style.display = 'block';

                    document.getElementById('prof-name').innerText = data.name;
                    document.getElementById('prof-role').innerText = data.role;
                    document.getElementById('prof-email').innerText = data.email;
                    document.getElementById('prof-id').innerText = data.profile_id;
                    document.getElementById('prof-dept').innerText = data.department;
                    document.getElementById('avatar-initial').innerText = data.name.charAt(0).toUpperCase();
                } else {
                    // Token invalid or expired
                    window.location.href = 'auth.html';
                }
            } catch (err) {
                document.getElementById('loader').innerText = 'Failed to load profile. Is the server running?';
            }
        });
    </script>
</body>
</html>
